name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --locked

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Run migrations
        run: uv run alembic upgrade head
        env:
          EVALOPS_DATABASE_URL: sqlite:///./ci_evalops.db

      - name: Test
        run: uv run pytest

  postgres-smoke:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: evalops
          POSTGRES_PASSWORD: evalops
          POSTGRES_DB: evalops
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      EVALOPS_DATABASE_URL: postgresql+psycopg://evalops:evalops@localhost:5432/evalops

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --locked

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Postgres smoke test
        run: uv run pytest postgres_smoke_test/ -v

  ollama-smoke:
    runs-on: ubuntu-latest

    services:
      ollama:
        image: ollama/ollama
        ports:
          - 11434:11434

    env:
      LLM_JUDGE_PROVIDER: ollama
      OLLAMA_HOST: http://localhost:11434
      OLLAMA_JUDGE_MODEL: qwen2.5:1.5b
      EVALOPS_DATABASE_URL: sqlite:///./ci_ollama.db

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --locked

      - name: Wait for Ollama to be ready
        run: |
          for _ in $(seq 1 30); do
            curl -sf http://localhost:11434/ && exit 0
            sleep 2
          done
          echo "Ollama did not become ready in time" >&2
          exit 1

      - name: Pull Ollama model
        run: |
          curl -sf --max-time 300 http://localhost:11434/api/pull \
            -d '{"model": "qwen2.5:1.5b", "stream": false}'

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Ollama judge smoke test
        run: uv run pytest ollama_smoke_test/ -v
